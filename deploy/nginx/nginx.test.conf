# Standalone parser harness for the versioned site. On the production VPS run:
# sudo nginx -t -p "$PWD/deploy/nginx/" -c nginx.test.conf
pid /tmp/imageeditor-nginx-config-test.pid;
error_log stderr;

events {}

http {
    include /etc/nginx/mime.types;
    include sites-available/imageeditor.micutu.com;
}
